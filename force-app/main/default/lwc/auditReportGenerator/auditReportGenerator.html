<template>
  <lightning-card title={label.CardTitle} icon-name="standard:report">
    <div class="slds-p-around_medium">
      <template lwc:if={isLoading}>
        <div class="slds-is-relative slds-p-around_medium">
          <lightning-spinner alternative-text={label.SpinnerAlt} size="medium"></lightning-spinner>
        </div>
      </template>

      <template lwc:if={hasError}>
        <div class="slds-text-color_error slds-p-around_medium" role="alert">
          <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_x-small" aria-hidden="true"></lightning-icon>
          {errorMessage}
        </div>
      </template>

      <template lwc:if={notLoading}>
        <div class="slds-grid slds-gutters">
          <div class="slds-col slds-size_1-of-3">
            <lightning-combobox
              label={label.FrameworkLabel}
              value={selectedFramework}
              options={frameworks}
              onchange={handleFrameworkChange}
              required
            ></lightning-combobox>
          </div>
          <div class="slds-col slds-size_1-of-3">
            <lightning-input
              type="date"
              label={label.StartDateLabel}
              value={startDate}
              onchange={handleStartDateChange}
              required
            ></lightning-input>
          </div>
          <div class="slds-col slds-size_1-of-3">
            <lightning-input
              type="date"
              label={label.EndDateLabel}
              value={endDate}
              onchange={handleEndDateChange}
              required
            ></lightning-input>
          </div>
        </div>

        <div class="slds-m-top_medium">
          <lightning-button
            label={label.GenerateReport}
            variant="brand"
            onclick={handleGenerateReport}
            disabled={isLoading}
          ></lightning-button>
          <template lwc:if={reportData}>
            <lightning-button
              label={label.ExportPDF}
              variant="neutral"
              onclick={handleExportPDF}
              disabled={isLoading}
              class="slds-m-left_small"
            ></lightning-button>
          </template>
        </div>

        <template lwc:if={reportData}>
          <div class="slds-m-top_medium slds-box slds-theme_default">
            <h3 class="slds-text-heading_medium slds-m-bottom_small">{label.ReportSummary}</h3>
            <div class="slds-grid slds-gutters slds-wrap">
              <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                <span class="slds-text-title">{label.OverallScore}</span>
                <span class="slds-text-heading_small slds-m-left_x-small">{reportData.evaluation.overallScore}%</span>
              </div>
              <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                <span class="slds-text-title">{label.StatusLabel}</span>
                <span class="slds-badge slds-m-left_x-small">{reportData.evaluation.status}</span>
              </div>
              <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                <span class="slds-text-title">{label.TotalGaps}</span>
                <span class="slds-m-left_x-small">{reportData.totalGaps}</span>
              </div>
              <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                <span class="slds-text-title">{label.OpenGaps}</span>
                <span class="slds-m-left_x-small">{reportData.openGaps}</span>
              </div>
              <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                <span class="slds-text-title">{label.TotalEvidence}</span>
                <span class="slds-m-left_x-small">{reportData.totalEvidence}</span>
              </div>
            </div>
          </div>
        </template>
      </template>
    </div>
  </lightning-card>
</template>
