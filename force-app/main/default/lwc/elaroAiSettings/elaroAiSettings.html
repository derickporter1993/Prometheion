<template>
  <lightning-card title={label.CardTitle} icon-name="custom:custom30">
    <div class="slds-p-around_medium">
      <template lwc:if={isLoading}>
        <div class="slds-is-relative slds-p-around_medium">
          <lightning-spinner alternative-text={label.LoadingAlt} size="medium"></lightning-spinner>
        </div>
      </template>

      <template lwc:if={hasError}>
        <div class="slds-text-color_error slds-p-around_medium" role="alert">
          <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_x-small" aria-hidden="true"></lightning-icon>
          {errorMessage}
        </div>
      </template>

      <template lwc:if={notLoading}>
        <template lwc:if={notError}>
          <lightning-input
            type="checkbox"
            label={label.EnableAIReasoning}
            checked={enableAI}
            onchange={handleToggleAI}
            class="slds-m-bottom_medium"
          ></lightning-input>

      <lightning-input
        type="checkbox"
        label={label.RequireApproval}
        checked={requireApproval}
        onchange={handleToggleApproval}
        class="slds-m-bottom_medium"
      ></lightning-input>

      <lightning-input
        type="checkbox"
        label={label.EnableAutoRemediation}
        checked={autoRemediate}
        onchange={handleToggleRemediation}
        class="slds-m-bottom_medium"
      ></lightning-input>

      <lightning-input
        type="number"
        label={label.ConfidenceThreshold}
        value={confidenceThreshold}
        step="0.01"
        min="0.0"
        max="1.0"
        onchange={handleThresholdChange}
        class="slds-m-bottom_medium"
      ></lightning-input>

      <div id="blacklistedUsersHelp" class="slds-text-body_small slds-m-bottom_xx-small">
        {label.BlacklistedUsersHelp}
      </div>
      <lightning-textarea
        label={label.BlacklistedUsersLabel}
        value={blacklistedUsers}
        onchange={handleBlacklistChange}
        placeholder={label.BlacklistedUsersPlaceholder}
        aria-describedby="blacklistedUsersHelp"
        class="slds-m-bottom_medium"
      ></lightning-textarea>

          <div class="slds-text-align_center slds-m-top_large">
            <lightning-button
              label={label.SaveSettings}
              variant="brand"
              onclick={handleSave}
            ></lightning-button>
          </div>
        </template>
      </template>
    </div>
  </lightning-card>
</template>
