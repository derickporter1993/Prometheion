<template>
  <lightning-card title={label.CardTitle} icon-name="standard:work_order">
    <div class="slds-var-p-around_medium" role="main" aria-label={label.CardTitle}>
      <!-- Progress Indicator -->
      <nav aria-label="Wizard progress">
        <lightning-progress-indicator current-step={currentStep} type="path" variant="base">
          <lightning-progress-step label={label.StepFramework} value="1"></lightning-progress-step>
          <lightning-progress-step label={label.StepDateRange} value="2"></lightning-progress-step>
          <lightning-progress-step label={label.StepControls} value="3"></lightning-progress-step>
          <lightning-progress-step label={label.StepPreview} value="4"></lightning-progress-step>
          <lightning-progress-step label={label.StepGenerate} value="5"></lightning-progress-step>
        </lightning-progress-indicator>
      </nav>

      <!-- Step Content -->
      <div class="slds-var-m-top_large step-content">
        <!-- Step 1: Framework Selection -->
        <template lwc:if={isStep1}>
          <section class="step-panel" aria-labelledby="step1-heading">
            <h2 id="step1-heading" class="slds-text-heading_medium slds-var-m-bottom_medium">
              {label.SelectFrameworkHeading}
            </h2>
            <p class="slds-text-body_regular slds-var-m-bottom_large slds-text-color_weak">
              {label.SelectFrameworkDesc}
            </p>

            <div
              class="slds-grid slds-wrap slds-gutters"
              role="radiogroup"
              aria-label={label.SelectFrameworkHeading}
            >
              <template for:each={frameworks} for:item="framework">
                <div
                  key={framework.value}
                  class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-var-m-bottom_medium"
                >
                  <button
                    class={framework.cardClass}
                    onclick={handleFrameworkSelect}
                    onkeydown={handleFrameworkKeydown}
                    data-value={framework.value}
                    role="radio"
                    aria-checked={framework.isSelected}
                    aria-label={framework.ariaLabel}
                    type="button"
                  >
                    <lightning-icon
                      icon-name={framework.icon}
                      size="large"
                      class="slds-var-m-bottom_small"
                    ></lightning-icon>
                    <h3 class="slds-text-heading_small">{framework.label}</h3>
                    <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_x-small">
                      {framework.description}
                    </p>
                  </button>
                </div>
              </template>
            </div>
          </section>
        </template>

        <!-- Step 2: Date Range -->
        <template lwc:if={isStep2}>
          <section class="step-panel" aria-labelledby="step2-heading">
            <h2 id="step2-heading" class="slds-text-heading_medium slds-var-m-bottom_medium">
              {label.SelectAuditPeriod}
            </h2>
            <p class="slds-text-body_regular slds-var-m-bottom_large slds-text-color_weak">
              {label.AuditPeriodDesc}
            </p>

            <fieldset class="slds-form-element">
              <legend class="slds-assistive-text">{label.StepDateRange}</legend>
              <div class="slds-grid slds-gutters">
                <div class="slds-col slds-size_1-of-2">
                  <lightning-input
                    type="date"
                    label={label.StartDateLabel}
                    value={auditStartDate}
                    onchange={handleStartDateChange}
                    required
                    message-when-value-missing="Please select a start date"
                  >
                  </lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-2">
                  <lightning-input
                    type="date"
                    label={label.EndDateLabel}
                    value={auditEndDate}
                    onchange={handleEndDateChange}
                    required
                    message-when-value-missing="Please select an end date"
                  >
                  </lightning-input>
                </div>
              </div>
            </fieldset>

            <div class="slds-var-m-top_medium" role="group" aria-label="Quick date range selection">
              <h3 class="slds-text-title_caps slds-var-m-bottom_small" id="quick-select-label">
                {label.QuickSelect}
              </h3>
              <lightning-button-group aria-labelledby="quick-select-label">
                <lightning-button
                  label={label.LastMonth}
                  onclick={handleLastMonth}
                ></lightning-button>
                <lightning-button
                  label={label.LastQuarter}
                  onclick={handleLastQuarter}
                ></lightning-button>
                <lightning-button
                  label={label.LastYear}
                  onclick={handleLastYear}
                ></lightning-button>
                <lightning-button
                  label="YTD"
                  onclick={handleYTD}
                ></lightning-button>
              </lightning-button-group>
            </div>
          </section>
        </template>

        <!-- Step 3: Control Selection -->
        <template lwc:if={isStep3}>
          <section class="step-panel" aria-labelledby="step3-heading">
            <h2 id="step3-heading" class="slds-text-heading_medium slds-var-m-bottom_medium">
              {label.SelectControlsHeading}
            </h2>
            <p class="slds-text-body_regular slds-var-m-bottom_large slds-text-color_weak">
              {label.SelectControlsDesc}
            </p>

            <div class="slds-var-m-bottom_medium" role="group" aria-label="Bulk selection options">
              <lightning-button-group>
                <lightning-button
                  label={label.SelectAll}
                  onclick={handleSelectAll}
                ></lightning-button>
                <lightning-button
                  label={label.ClearAll}
                  onclick={handleClearAll}
                ></lightning-button>
                <lightning-button
                  label={label.SelectFailedOnly}
                  onclick={handleSelectFailed}
                ></lightning-button>
              </lightning-button-group>
            </div>

            <fieldset class="control-list">
              <legend class="slds-assistive-text">
                Available controls for {selectedFrameworkLabel}
              </legend>
              <template for:each={controls} for:item="control">
                <div
                  key={control.id}
                  class="control-item slds-var-p-around_small slds-var-m-bottom_x-small"
                >
                  <lightning-input
                    type="checkbox"
                    label={control.name}
                    checked={control.selected}
                    data-id={control.id}
                    onchange={handleControlToggle}
                  >
                  </lightning-input>
                  <div class="control-meta slds-var-m-left_large">
                    <span
                      class={control.statusClass}
                      role="status"
                      aria-label={control.statusAriaLabel}
                      >{control.status}</span
                    >
                    <span
                      class="slds-text-body_small slds-text-color_weak slds-var-m-left_small"
                      aria-label={control.codeAriaLabel}
                      >{control.code}</span
                    >
                  </div>
                </div>
              </template>
            </fieldset>

            <div
              class="slds-var-m-top_medium slds-text-align_right"
              role="status"
              aria-live="polite"
              aria-atomic="true"
            >
              <span class="slds-text-body_small"
                >{selectedControlsCount} of {totalControlsCount} controls selected</span
              >
            </div>
          </section>
        </template>

        <!-- Step 4: Preview -->
        <template lwc:if={isStep4}>
          <section class="step-panel" aria-labelledby="step4-heading">
            <h2 id="step4-heading" class="slds-text-heading_medium slds-var-m-bottom_medium">
              {label.PreviewHeading}
            </h2>
            <p class="slds-text-body_regular slds-var-m-bottom_large slds-text-color_weak">
              {label.PreviewDesc}
            </p>

            <div
              class="preview-box slds-box slds-theme_shade"
              role="region"
              aria-label="Package configuration summary"
            >
              <dl class="slds-dl_horizontal slds-var-m-bottom_medium">
                <dt class="slds-dl_horizontal__label">{label.StepFramework}:</dt>
                <dd class="slds-dl_horizontal__detail">
                  <strong>{selectedFrameworkLabel}</strong>
                </dd>

                <dt class="slds-dl_horizontal__label">{label.SelectAuditPeriod}:</dt>
                <dd class="slds-dl_horizontal__detail">{auditStartDate} to {auditEndDate}</dd>

                <dt class="slds-dl_horizontal__label">{label.StepControls}:</dt>
                <dd class="slds-dl_horizontal__detail">
                  {selectedControlsCount} controls selected
                </dd>

                <dt class="slds-dl_horizontal__label">Package Name:</dt>
                <dd class="slds-dl_horizontal__detail">
                  <lightning-input
                    type="text"
                    value={packageName}
                    onchange={handlePackageNameChange}
                    label="Package Name"
                    variant="label-hidden"
                    placeholder={label.EnterPackageName}
                    required
                  >
                  </lightning-input>
                </dd>
              </dl>

              <h3 class="slds-text-title_caps slds-var-m-bottom_small" id="output-options-label">
                {label.OutputOptions}
              </h3>
              <lightning-checkbox-group
                name="outputOptions"
                label={label.IncludeInPackage}
                options={outputOptions}
                value={selectedOutputOptions}
                onchange={handleOutputOptionsChange}
              >
              </lightning-checkbox-group>
            </div>
          </section>
        </template>

        <!-- Step 5: Generate -->
        <template lwc:if={isStep5}>
          <section class="step-panel slds-text-align_center">
            <template lwc:if={isGenerating}>
              <div role="status" aria-live="polite" aria-busy="true">
                <lightning-spinner
                  alternative-text={label.GeneratingHeading}
                  size="large"
                ></lightning-spinner>
                <h2
                  id="step5-heading-generating"
                  class="slds-text-heading_medium slds-var-m-top_large"
                >
                  {label.GeneratingHeading}
                </h2>
                <p
                  class="slds-text-body_regular slds-text-color_weak slds-var-m-top_small"
                  aria-live="polite"
                >
                  {generationStatus}
                </p>
                <lightning-progress-bar
                  value={generationProgress}
                  size="large"
                  class="slds-var-m-top_medium"
                  aria-label={progressAriaLabel}
                >
                </lightning-progress-bar>
              </div>
            </template>

            <template lwc:else>
              <template lwc:if={generationComplete}>
                <div role="status" aria-live="polite">
                  <lightning-icon
                    icon-name="utility:success"
                    size="xx-large"
                    variant="success"
                    alternative-text="Success"
                  ></lightning-icon>
                  <h2
                    id="step5-heading-complete"
                    class="slds-text-heading_medium slds-var-m-top_medium"
                  >
                    {label.PackageGenerated}
                  </h2>
                  <p class="slds-text-body_regular slds-text-color_weak slds-var-m-top_small">
                    {label.PackageCreatedMsg}
                  </p>
                </div>
                <div class="slds-var-m-top_large" role="group" aria-label="Package actions">
                  <lightning-button
                    variant="brand"
                    label={label.DownloadPDF}
                    onclick={handleDownloadPDF}
                    class="slds-var-m-right_small"
                  ></lightning-button>
                  <lightning-button
                    label={label.ViewPackage}
                    onclick={handleViewPackage}
                    class="slds-var-m-right_small"
                  ></lightning-button>
                  <lightning-button
                    label={label.CreateNewPackage}
                    onclick={handleReset}
                  ></lightning-button>
                </div>
              </template>
              <template lwc:else>
                <lightning-icon
                  icon-name="utility:file"
                  size="xx-large"
                  class="icon-muted"
                  alternative-text="File icon"
                ></lightning-icon>
                <h2 id="step5-heading-ready" class="slds-text-heading_medium slds-var-m-top_medium">
                  {label.ReadyToGenerate}
                </h2>
                <p class="slds-text-body_regular slds-text-color_weak slds-var-m-top_small">
                  {label.ReadyToGenerateDesc}
                </p>
                <lightning-button
                  variant="brand"
                  label={label.GenerateAuditPackage}
                  onclick={handleGenerate}
                  class="slds-var-m-top_large"
                >
                </lightning-button>
              </template>
            </template>
          </section>
        </template>
      </div>

      <!-- Navigation Buttons -->
      <div class="slds-var-m-top_large slds-grid slds-grid_align-spread">
        <lightning-button
          label={label.PreviousBtn}
          onclick={handlePrevious}
          disabled={isPreviousDisabled}
        >
        </lightning-button>
        <lightning-button
          variant="brand"
          label={nextButtonLabel}
          onclick={handleNext}
          disabled={isNextDisabled}
        >
        </lightning-button>
      </div>
    </div>
  </lightning-card>
</template>
