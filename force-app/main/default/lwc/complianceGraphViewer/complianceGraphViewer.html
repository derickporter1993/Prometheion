<template>
    <lightning-card title={label.CardTitle} icon-name="standard:relationship">
        <div slot="actions">
            <lightning-button-group>
                <lightning-combobox
                    label={label.FilterByFramework}
                    variant="label-hidden"
                    value={selectedFramework}
                    options={frameworkOptions}
                    onchange={handleFrameworkChange}
                    class="slds-m-right_small">
                </lightning-combobox>
                <lightning-button
                    label={label.RefreshBtn}
                    icon-name="utility:refresh"
                    onclick={handleRefresh}>
                </lightning-button>
            </lightning-button-group>
        </div>

        <div class="slds-p-around_medium">
            <!-- Stats Summary -->
            <template lwc:if={stats}>
                <div class="slds-grid slds-gutters slds-m-bottom_medium">
                    <template for:each={statsForDisplay} for:item="stat">
                        <div key={stat.label} class="slds-col slds-size_1-of-3">
                            <div class="slds-box slds-text-align_center">
                                <lightning-icon icon-name={stat.icon} size="small" class="slds-m-bottom_x-small"></lightning-icon>
                                <div class="slds-text-heading_large">{stat.value}</div>
                                <div class="slds-text-body_small slds-text-color_weak">{stat.label}</div>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Severity Distribution -->
                <div class="slds-m-bottom_medium">
                    <div class="slds-text-title_caps slds-m-bottom_x-small">{label.SeverityDistribution}</div>
                    <div class="slds-grid slds-wrap">
                        <template for:each={severityStats} for:item="sev">
                            <div key={sev.label} class="slds-m-right_small slds-m-bottom_x-small">
                                <lightning-badge label={sev.badgeLabel} variant={sev.variant}></lightning-badge>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Graph Container -->
            <div class="slds-box slds-box_border">
                <template lwc:if={isLoading}>
                    <div class="slds-align_absolute-center" style="height: 500px;">
                        <lightning-spinner alternative-text={label.LoadingGraph} size="large"></lightning-spinner>
                    </div>
                </template>

                <template lwc:elseif={hasGraph}>
                    <div class="graph-container"></div>

                    <!-- Legend -->
                    <div class="slds-m-top_small slds-grid slds-wrap slds-grid_align-center">
                        <div class="slds-m-right_medium">
                            <span class="slds-badge" style="background-color: #1E88E5;">{label.FrameworkLegend}</span>
                        </div>
                        <div class="slds-m-right_medium">
                            <span class="slds-badge" style="background-color: #607D8B;">{label.PolicyLegend}</span>
                        </div>
                        <div class="slds-m-right_medium">
                            <span class="slds-badge" style="background-color: #D32F2F;">{label.CriticalGapLegend}</span>
                        </div>
                        <div class="slds-m-right_medium">
                            <span class="slds-badge" style="background-color: #F57C00;">{label.HighGapLegend}</span>
                        </div>
                        <div class="slds-m-right_medium">
                            <span class="slds-badge" style="background-color: #FBC02D;">{label.MediumGapLegend}</span>
                        </div>
                        <div class="slds-m-right_medium">
                            <span class="slds-badge" style="background-color: #9C27B0;">{label.EntityLegend}</span>
                        </div>
                    </div>
                </template>

                <template lwc:else>
                    <div class="slds-illustration slds-illustration_small slds-align_absolute-center" style="height: 500px;">
                        <div class="slds-text-longform">
                            <h3 class="slds-text-heading_medium">{label.NoGraphData}</h3>
                            <p class="slds-text-body_regular">
                                {label.NoGraphDescription}
                            </p>
                        </div>
                    </div>
                </template>
            </div>

            <div class="slds-m-top_small slds-text-body_small slds-text-color_weak">
                {label.ClickNodeHint}
            </div>
        </div>
    </lightning-card>

    <!-- Node Details Panel -->
    <template lwc:if={showDetailsPanel}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium" aria-modal="true" aria-labelledby="node-details-heading" onkeydown={handleModalKeydown}>
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={closeDetailsPanel}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        <span class="slds-assistive-text">{label.CloseBtn}</span>
                    </button>
                    <h2 id="node-details-heading" class="slds-modal__title">{nodeTypeLabel}: {selectedNode.label}</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <template lwc:if={nodeDetails}>
                        <dl class="slds-dl_horizontal">
                            <dt class="slds-dl_horizontal__label">{label.NameLabel}</dt>
                            <dd class="slds-dl_horizontal__detail">{nodeDetails.name}</dd>

                            <dt class="slds-dl_horizontal__label">{label.TypeLabel}</dt>
                            <dd class="slds-dl_horizontal__detail">{nodeDetails.nodeType}</dd>

                            <template lwc:if={nodeDetails.metadata.framework}>
                                <dt class="slds-dl_horizontal__label">{label.FrameworkLabel}</dt>
                                <dd class="slds-dl_horizontal__detail">{nodeDetails.metadata.framework}</dd>
                            </template>

                            <template lwc:if={nodeDetails.metadata.severity}>
                                <dt class="slds-dl_horizontal__label">{label.SeverityLabel}</dt>
                                <dd class="slds-dl_horizontal__detail">{nodeDetails.metadata.severity}</dd>
                            </template>

                            <template lwc:if={nodeDetails.metadata.status}>
                                <dt class="slds-dl_horizontal__label">{label.StatusLabel}</dt>
                                <dd class="slds-dl_horizontal__detail">{nodeDetails.metadata.status}</dd>
                            </template>

                            <template lwc:if={nodeDetails.metadata.riskScore}>
                                <dt class="slds-dl_horizontal__label">{label.RiskScoreLabel}</dt>
                                <dd class="slds-dl_horizontal__detail">{nodeDetails.metadata.riskScore}</dd>
                            </template>

                            <template lwc:if={nodeDetails.metadata.description}>
                                <dt class="slds-dl_horizontal__label">{label.DescriptionLabel}</dt>
                                <dd class="slds-dl_horizontal__detail">{nodeDetails.metadata.description}</dd>
                            </template>

                            <template lwc:if={nodeDetails.metadata.entityType}>
                                <dt class="slds-dl_horizontal__label">{label.EntityTypeLabel}</dt>
                                <dd class="slds-dl_horizontal__detail">{nodeDetails.metadata.entityType}</dd>
                            </template>

                            <template lwc:if={nodeDetails.metadata.entityId}>
                                <dt class="slds-dl_horizontal__label">{label.EntityIdLabel}</dt>
                                <dd class="slds-dl_horizontal__detail">{nodeDetails.metadata.entityId}</dd>
                            </template>
                        </dl>
                    </template>
                </div>

                <footer class="slds-modal__footer">
                    <template lwc:if={showImpactButton}>
                        <lightning-button
                            label={label.AnalyzeImpactBtn}
                            variant="brand"
                            icon-name="utility:target"
                            onclick={handleAnalyzeImpact}
                            class="slds-m-right_x-small">
                        </lightning-button>
                    </template>
                    <lightning-button label={label.CloseBtn} onclick={closeDetailsPanel}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Impact Analysis Panel -->
    <template lwc:if={showImpactPanel}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large" aria-modal="true" aria-labelledby="impact-analysis-heading" onkeydown={handleModalKeydown}>
            <div class="slds-modal__container">
                <header class="slds-modal__header slds-theme_warning">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={closeImpactPanel}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        <span class="slds-assistive-text">{label.CloseBtn}</span>
                    </button>
                    <h2 id="impact-analysis-heading" class="slds-modal__title">{label.ImpactAnalysisTitle}</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <template lwc:if={impactAnalysis}>
                        <!-- Summary Stats -->
                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-4">
                                <div class="slds-box slds-text-align_center slds-theme_error">
                                    <div class="slds-text-heading_large">{impactAnalysis.criticalCount}</div>
                                    <div class="slds-text-body_small">{label.CriticalLabel}</div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-4">
                                <div class="slds-box slds-text-align_center slds-theme_warning">
                                    <div class="slds-text-heading_large">{impactAnalysis.highCount}</div>
                                    <div class="slds-text-body_small">{label.HighLabel}</div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-4">
                                <div class="slds-box slds-text-align_center">
                                    <div class="slds-text-heading_large">{impactAnalysis.mediumCount}</div>
                                    <div class="slds-text-body_small">{label.MediumLabel}</div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-4">
                                <div class="slds-box slds-text-align_center slds-theme_success">
                                    <div class="slds-text-heading_large">{impactAnalysis.lowCount}</div>
                                    <div class="slds-text-body_small">{label.LowLabel}</div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-box slds-m-bottom_medium">
                            <p><strong>{label.TotalRiskScore}</strong> {impactAnalysis.riskScore}</p>
                            <p><strong>{label.TotalGapsAffected}</strong> {impactAnalysis.totalGaps}</p>
                        </div>

                        <!-- Affected Gaps List -->
                        <template lwc:if={impactAnalysis.affectedGaps.length}>
                            <div class="slds-text-heading_small slds-m-bottom_small">{label.AffectedGapsTitle}</div>
                            <template for:each={impactAnalysis.affectedGaps} for:item="gap">
                                <div key={gap.gapId} class="slds-box slds-box_x-small slds-m-bottom_x-small">
                                    <div class="slds-grid slds-grid_vertical-align-center">
                                        <div class="slds-col slds-grow">
                                            <strong>{gap.gapName}</strong>
                                            <span class="slds-text-body_small slds-text-color_weak slds-m-left_x-small">
                                                {gap.framework}
                                            </span>
                                        </div>
                                        <div class="slds-col slds-shrink">
                                            <lightning-badge label={gap.severity}></lightning-badge>
                                            <lightning-badge label={gap.status} class="slds-m-left_x-small"></lightning-badge>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </template>
                    </template>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label={label.CloseBtn} onclick={closeImpactPanel}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
