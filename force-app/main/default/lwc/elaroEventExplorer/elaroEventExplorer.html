<template>
  <lightning-card title={label.CardTitle} icon-name="standard:event">
    <!-- Filters Section -->
    <div slot="actions">
      <lightning-button-icon
        icon-name="utility:refresh"
        alternative-text={label.RefreshAlt}
        title={label.RefreshAlt}
        onclick={handleRefresh}
        class="slds-var-m-right_x-small"
      >
      </lightning-button-icon>
      <lightning-button
        label={label.ExportCSV}
        icon-name="utility:download"
        onclick={handleExportCSV}
        variant="neutral"
      >
      </lightning-button>
    </div>

    <div class="slds-var-p-around_medium">
      <!-- Filter Controls -->
      <div class="slds-grid slds-gutters slds-wrap slds-var-m-bottom_medium">
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
          <lightning-combobox
            name="eventType"
            label={label.EventTypeLabel}
            value={selectedEventType}
            placeholder={label.EventTypeLabel}
            options={eventTypeOptions}
            onchange={handleEventTypeChange}
          >
          </lightning-combobox>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
          <lightning-combobox
            name="riskLevel"
            label={label.RiskLevelLabel}
            value={selectedRiskLevel}
            placeholder={label.RiskLevelLabel}
            options={riskLevelOptions}
            onchange={handleRiskLevelChange}
          >
          </lightning-combobox>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
          <lightning-input
            type="date"
            name="startDate"
            label={label.StartDateLabel}
            value={startDate}
            onchange={handleStartDateChange}
          >
          </lightning-input>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
          <lightning-input
            type="date"
            name="endDate"
            label={label.EndDateLabel}
            value={endDate}
            onchange={handleEndDateChange}
          >
          </lightning-input>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="slds-var-m-bottom_medium">
        <lightning-input
          type="search"
          label={label.SearchEvents}
          placeholder={label.SearchPlaceholder}
          value={searchTerm}
          onchange={handleSearchChange}
        >
        </lightning-input>
      </div>

      <!-- Statistics Cards -->
      <div
        class="slds-grid slds-gutters slds-wrap slds-var-m-bottom_medium"
        role="region"
        aria-label="Event statistics"
        aria-live="polite"
        aria-atomic="true"
      >
        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
          <div class="stat-card total" role="status" aria-label={totalEventsAriaLabel}>
            <div class="stat-value" aria-hidden="true">{totalEvents}</div>
            <div class="stat-label">{label.TotalEventsLabel}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
          <div class="stat-card critical" role="status" aria-label={criticalAriaLabel}>
            <div class="stat-value" aria-hidden="true">{criticalCount}</div>
            <div class="stat-label">{label.CriticalLabel}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
          <div class="stat-card high" role="status" aria-label={highRiskAriaLabel}>
            <div class="stat-value" aria-hidden="true">{highRiskCount}</div>
            <div class="stat-label">{label.HighRiskLabel}</div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
          <div class="stat-card medium" role="status" aria-label={mediumRiskAriaLabel}>
            <div class="stat-value" aria-hidden="true">{mediumRiskCount}</div>
            <div class="stat-label">{label.MediumRiskLabel}</div>
          </div>
        </div>
      </div>

      <!-- Events Data Table -->
      <template lwc:if={isLoading}>
        <lightning-spinner alternative-text={label.LoadingAlt} size="medium"></lightning-spinner>
      </template>

      <template lwc:else>
        <template lwc:if={hasEvents}>
          <lightning-datatable
            key-field="id"
            data={filteredEvents}
            columns={columns}
            sorted-by={sortedBy}
            sorted-direction={sortedDirection}
            onsort={handleSort}
            onrowaction={handleRowAction}
            show-row-number-column
            max-row-selection="1"
          >
          </lightning-datatable>
        </template>

        <template lwc:else>
          <div class="slds-illustration slds-illustration_small" role="status" aria-live="polite">
            <div class="slds-text-align_center">
              <p class="slds-text-body_regular slds-text-color_weak">
                {label.NoEventsMsg}
              </p>
            </div>
          </div>
        </template>
      </template>
    </div>
  </lightning-card>

  <!-- Event Detail Modal -->
  <template lwc:if={showModal}>
    <section
      role="dialog"
      tabindex="-1"
      class="slds-modal slds-fade-in-open"
      aria-modal="true"
      aria-labelledby="modal-heading"
      aria-describedby="modal-content"
      onkeydown={handleModalKeydown}
    >
      <div class="slds-modal__container">
        <header class="slds-modal__header">
          <button
            class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
            onclick={closeModal}
            aria-label={label.CloseBtn}
            title={label.CloseBtn}
            type="button"
          >
            <lightning-icon
              icon-name="utility:close"
              size="small"
              alternative-text={label.CloseBtn}
            ></lightning-icon>
          </button>
          <h2 id="modal-heading" class="slds-modal__title">{label.EventDetailsTitle}</h2>
        </header>
        <div id="modal-content" class="slds-modal__content slds-var-p-around_medium">
          <template lwc:if={selectedEvent}>
            <dl class="slds-dl_horizontal" role="list" aria-label={label.EventDetailsTitle}>
              <dt class="slds-dl_horizontal__label">{label.EventIdLabel}:</dt>
              <dd class="slds-dl_horizontal__detail">{selectedEvent.id}</dd>

              <dt class="slds-dl_horizontal__label">{label.EventTypeLabel}:</dt>
              <dd class="slds-dl_horizontal__detail">{selectedEvent.eventType}</dd>

              <dt class="slds-dl_horizontal__label">{label.RiskLevelLabel}:</dt>
              <dd class="slds-dl_horizontal__detail">
                <lightning-badge
                  label={selectedEvent.riskLevel}
                  class={selectedEvent.riskClass}
                ></lightning-badge>
              </dd>

              <dt class="slds-dl_horizontal__label">{label.RiskScoreLabel}:</dt>
              <dd class="slds-dl_horizontal__detail">{selectedEvent.riskScore}</dd>

              <dt class="slds-dl_horizontal__label">{label.UserLabel}:</dt>
              <dd class="slds-dl_horizontal__detail">{selectedEvent.userName}</dd>

              <dt class="slds-dl_horizontal__label">{label.TimestampLabel}:</dt>
              <dd class="slds-dl_horizontal__detail">{selectedEvent.formattedTimestamp}</dd>

              <dt class="slds-dl_horizontal__label">{label.SourceIpLabel}:</dt>
              <dd class="slds-dl_horizontal__detail">{selectedEvent.sourceIp}</dd>

              <dt class="slds-dl_horizontal__label">{label.DescriptionLabel}:</dt>
              <dd class="slds-dl_horizontal__detail">{selectedEvent.description}</dd>
            </dl>
          </template>
        </div>
        <footer class="slds-modal__footer">
          <lightning-button
            label={label.CloseBtn}
            onclick={closeModal}
          ></lightning-button>
          <lightning-button
            variant="brand"
            label={label.AnalyzeRootCause}
            onclick={handleAnalyze}
          ></lightning-button>
        </footer>
      </div>
    </section>
    <div
      class="slds-backdrop slds-backdrop_open"
      onclick={closeModal}
      onkeydown={handleBackdropKeydown}
      tabindex="-1"
      role="presentation"
      aria-hidden="true"
    ></div>
  </template>
</template>
