name: Elaro CI/CD

on:
  push:
    branches: [main, develop, "release/*", "claude/*"]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20.17.0"
  ORG_ALIAS: "elaro-ci"

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Format Check
        run: npm run fmt:check

      - name: Lint Code
        run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run LWC Tests
        run: npm run test:unit

  security-scan:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install Code Analyzer
        run: sf plugins install @salesforce/sfdx-scanner

      - name: Create Scanner Reports Directory
        run: mkdir -p scanner-reports

      - name: Run AppExchange Security Scan (HTML)
        run: |
          echo "🔍 Running Salesforce Code Analyzer with AppExchange engine..."
          sf scanner run \
            --target "force-app/" \
            --engine pmd-appexchange \
            --format "html" \
            --outfile "scanner-reports/code-analyzer-appexchange.html" \
            --severity-threshold 2

      - name: Run AppExchange Security Scan (JSON)
        run: |
          echo "📊 Generating JSON report for CI analysis..."
          sf scanner run \
            --target "force-app/" \
            --engine pmd-appexchange \
            --format "json" \
            --outfile "scanner-reports/code-analyzer-appexchange.json" \
            --severity-threshold 2

      - name: Run AppExchange Security Scan (Table)
        run: |
          echo "📋 Displaying scan results in console..."
          sf scanner run \
            --target "force-app/" \
            --engine pmd-appexchange \
            --format "table" \
            --severity-threshold 2

      - name: Generate SARIF Report
        if: always()
        run: |
          sf scanner run --target "force-app" \
            --engine pmd \
            --format sarif \
            --outfile scanner-results.sarif || true

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scanner-results.sarif
        continue-on-error: true

      - name: Upload Scanner Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scanner-reports
          path: scanner-reports/
          retention-days: 30

  validate-metadata:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Validate Metadata Structure
        run: |
          echo "✅ Validating Elaro metadata structure..."
          test -d force-app/main/default/classes && echo "✅ Classes directory found"
          test -d force-app/main/default/lwc && echo "✅ LWC directory found"
          test -d force-app/main/default/objects && echo "✅ Objects directory found"
          test -f sfdx-project.json && echo "✅ sfdx-project.json found"

  cli-build:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm 10.2.0
        run: npm install -g npm@10.2.0

      - name: Verify npm version
        run: npm --version

      - name: Install Platform Dependencies
        working-directory: platform
        run: npm install

      - name: Build Platform Packages
        working-directory: platform
        run: npm run build

      - name: Verify Platform Build Output
        run: |
          echo "🔍 Verifying platform build artifacts..."
          if [ -d "platform/packages/cli" ]; then
            test -f platform/packages/cli/dist/index.js && echo "✅ CLI entry point built"
            test -f platform/packages/cli/dist/index.d.ts && echo "✅ CLI type declarations generated"
          else
            echo "⚠️ CLI package not found, skipping verification"
          fi
          echo "✅ Platform build successful"

  build-success:
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, validate-metadata, security-scan, cli-build]
    steps:
      - name: Build Summary
        run: |
          echo "✅ Elaro CI/CD Pipeline Complete"
          echo "🔒 Security scan completed"
          echo "🎉 All quality checks passed!"
          echo "📦 Ready for deployment"
